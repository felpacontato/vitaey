services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vitaey
      POSTGRES_USER: vitaey
      POSTGRES_PASSWORD: vitaey
    ports:
      - "5438:5432"
    volumes:
      - vitaey_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6388:6379"

volumes:
  vitaey_postgres:
